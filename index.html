  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

pplication\",\"name\":\"Blotter\",\"url\":\"https://www.tradeblotter.app/\",\"applicationCategory\":\"FinanceApplication\",\"operatingSystem\":\"Any (web browser)\",\"description\":\"Free, private trading journal for Interactive Brokers. P&L calendar, trade log and daily journal, parsed entirely in your browser.\",\"offers\":{\"@type\":\"Offer\",\"price\":\"0\",\"priceCurrency\":\"USD\"}}<\u002Fscript>\n<script type=\"application/ld+json\">{\"@context\":\"https://schema.org\",\"@type\":\"FAQPage\",\"mainEntity\":[{\"@type\":\"Question\",\"name\":\"Is Blotter really free?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Yes — Blotter is free while in beta. No account, no card, no trial timer.\"}},{\"@type\":\"Question\",\"name\":\"Where does my trading data go?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Nowhere. Parsing happens in your browser and results are stored on your device. There is no server to send them to.\"}},{\"@type\":\"Question\",\"name\":\"Which brokers are supported?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Interactive Brokers today — both the Transaction History CSV and Flex Query exports. More brokers will follow based on early-user feedback.\"}},{\"@type\":\"Question\",\"name\":\"What instruments does it handle?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Futures, options and stocks. Multi-currency accounts are converted to your base currency and totals are checked against your statement's cash balances.\"}},{\"@type\":\"Question\",\"name\":\"How does auto-refresh work?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Paste an IBKR Flex Web Service query ID and read-only token, stored on your device. IBKR blocks direct browser connections, so requests pass through an open-source, stateless relay that keeps nothing — no logs, no storage, no accounts. Parsing and storage happen in your browser. IBKR posts each day’s statement overnight; Blotter pulls it automatically on open, so yesterday’s session is on y m;color:oklch(0.6 0.02 262);\">NO SERVER · NO UPLOAD<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;\">\n        <svg width=\"28\" height=\"12\" sc-camel-view-box=\"0 0 28 12\" fill=\"none\" stroke=\"oklch(0.5 0.03 264)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M1 6h24\"><\u002Fpath><path d=\"M21 2l4 4-4 4\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"border:1px solid oklch(0.29 0.033 264);border-radius:13px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;justify-content:center;transition:transform .2s ease, box-shadow .2s ease;\" style-hover=\"transform:translateY(-2px);box-shadow:0 10px 28px oklch(0.08 0.02 264 / 0.45);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.12em;color:oklch(0.55 0.02 262);font-weight:600;\">YOUR REVIEW<\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;\">Calendar · Trades · Journal<\u002Fspan>\n        <span style=\"font-size:12px;color:oklch(0.62 0.015 260);line-height:1.55;\">Win/loss days, entry → exit, tags &amp; notes<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Founder note\" style=\"max-width:1080px;margin:0 auto;padding:72px 28px 0;\">\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.14em;color:oklch(0.55 0.02 262);font-weight:600;\">WHY THIS EXISTS<\u002Fspan>\n      <div style=\"flex:1;height:1px;background:oklch(0.25 0.03 264);\"><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:22px 0 0;font-size:16px;color:oklch(0.78 0.012 258);line-height:1.75;max-width:680px;\">I built Blotter for myself after a rough quarter trading micro futures. I wanted a straight look at my days and a place to write down what I kept repeating, and I didn’t see why that should cost $40 a month or mean parking my trading history on somebody’s server. It stays simple on purpose: a calendar, a trade log, a journal. Free, in your browser, yours.<\u002Fp>\n    <p style=\"margin:14px 0 0;font-size:13.5px;color:oklch(0.58 0.02 262);\">It’s early, and I’m building it in the open — <a href=\"mailto:feedback@tradeblotter.app?subject=Blotter%20beta%20feedback\" style=\"color:oklch(0.72 0.08 266);text-decoration:none;border-bottom:1px solid oklch(0.45 0.06 266);\" style-hover=\"color:oklch(0.85 0.06 266);\">send feedback and help make it better<\u002Fa>.<\u002Fp>\n  <\u002Fdiv>\n\n  <div id=\"features\" data-screen-label=\"What's inside\" style=\"max-width:1080px;margin:0 auto;padding:72px 28px 0;\">\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.14em;color:oklch(0.55 0.02 262);font-weight:600;\">WHAT'S INSIDE<\u002Fspan>\n      <div style=\"flex:1;height:1px;background:oklch(0.25 0.03 264);\"><\u002Fdiv>\n      <span style=\"font-size:12px;color:oklch(0.55 0.02 262);\">No bloat — the seven things a daily review actually uses.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-top:10px;\">\n      <a href=\"app.html#demo-calendar\" title=\"See it in the live demo\" style=\"text-decoration:none;color:inherit;display:grid;grid-template-columns:56px 230px 1fr;gap:18px;align-items:baseline;padding:17px 14px;margin:0 -14px;border-radius:11px;transition:background .15s ease;\" style-hover=\"background:oklch(0.19 0.032 264);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.48 0.02 262);\">01<\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;\">P&amp;L calendar <span style=\"font-size:11px;color:oklch(0.52 0.04 266);\">↗<\u002Fspan><\u002Fspan>\n        <span style=\"font-size:13px;color:oklch(0.63 0.015 260);line-height:1.6;\">Win and loss days at a glance, weekly totals, month P&amp;L — and a shareable calendar image.<\u002Fspan>\n      <\u002Fa>\n      <a href=\"app.html#demo-journal\" title=\"See it in the live demo\" style=\"text-decoration:none;color:inherit;display:grid;grid-template-columns:56px 230px 1fr;gap:18px;align-items:baseline;padding:17px 14px;margin:0 -14px;border-radius:11px;border-top:1px solid oklch(0.24 0.03 264);transition:background .15s ease;\" style-hover=\"background:oklch(0.19 0.032 264);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.48 0.02 262);\">02<\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;\">Daily journal &amp; tags <span style=\"font-size:11px;color:oklch(0.52 0.04 266);\">↗<\u002Fspan><\u002Fspan>\n        <span style=\"font-size:13px;color:oklch(0.63 0.015 260);line-height:1.6;\">The story of each session, tagged — A+ setups, FOMO, revenge trades — so the patterns surface.<\u002Fspan>\n      <\u002Fa>\n      <a href=\"app.html#demo-trades\" title=\"See it in the live demo\" style=\"text-decoration:none;color:inherit;display:grid;grid-template-columns:56px 230px 1fr;gap:18px;align-items:baseline;padding:17px 14px;margin:0 -14px;border-radius:11px;border-top:1px solid oklch(0.24 0.03 264);transition:background .15s ease;\" style-hover=\"background:oklch(0.19 0.032 264);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.48 0.02 262);\">03<\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;\">Complete trade log <span style=\"font-size:11px;color:oklch(0.52 0.04 266);\">↗<\u002Fspan><\u002Fspan>\n        <span style=\"font-size:13px;color:oklch(0.63 0.015 260);line-height:1.6;\">Every round-trip: entry → exit, hold time, win/loss coloring and per-trade notes.<\u002Fspan>\n      <\u002Fa>\n      <a href=\"app.html#demo-setups\" title=\"See it in the live demo\" style=\"text-decoration:none;color:inherit;display:grid;grid-template-columns:56px 230px 1fr;gap:18px;align-items:baseline;padding:17px 14px;margin:0 -14px;border-radius:11px;border-top:1px solid oklch(0.24 0.03 264);transition:background .15s ease;\" style-hover=\"background:oklch(0.19 0.032 264);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.48 0.02 262);\">04<\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;\">Setup analytics <span style=\"font-size:11px;color:oklch(0.52 0.04 266);\">↗<\u002Fspan><\u002Fspan>\n        <span style=\"font-size:13px;color:oklch(0.63 0.015 260);line-height:1.6;\">Tag each trade with its setup and see which ones actually pay you — win rate, net P&amp;L, count.<\u002Fspan>\n      <\u002Fa>\n      <a href=\"app.html#demo-equity\" title=\"See it in the live demo\" style=\"text-decoration:none;color:inherit;display:grid;grid-template-columns:56px 230px 1fr;gap:18px;align-items:baseline;padding:17px 14px;margin:0 -14px;border-radius:11px;border-top:1px solid oklch(0.24 0.03 264);transition:background .15s ease;\" style-hover=\"background:oklch(0.19 0.032 264);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.48 0.02 262);\">05<\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;\">Equity curve <span style=\"font-size:11px;color:oklch(0.52 0.04 266);\">↗<\u002Fspan><\u002Fspan>\n        <span style=\"font-size:13px;color:oklch(0.63 0.015 260);line-height:1.6;\">Cumulative P&amp;L across your whole history, with your worst peak-to-trough stretch marked.<\u002Fspan>\n      <\u002Fa>\n      <a href=\"app.html\" title=\"Open Blotter\" style=\"text-decoration:none;color:inherit;display:grid;grid-template-columns:56px 230px 1fr;gap:18px;align-items:baseline;padding:17px 14px;margin:0 -14px;border-radius:11px;border-top:1px solid oklch(0.24 0.03 264);transition:background .15s ease;\" style-hover=\"background:oklch(0.19 0.032 264);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.48 0.02 262);\">06<\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;\">One-file backup<\u002Fspan>\n        <span style=\"font-size:13px;color:oklch(0.63 0.015 260);line-height:1.6;\">Export your whole journal — notes, tags, setups and data — as a single file. Restore it anywhere.<\u002Fspan>\n      <\u002Fa>\n      <a href=\"app.html\" title=\"Set it up in the app\" style=\"text-decoration:none;color:inherit;display:grid;grid-template-columns:56px 230px 1fr;gap:18px;align-items:baseline;padding:17px 14px;margin:0 -14px;border-radius:11px;border-top:1px solid oklch(0.24 0.03 264);transition:background .15s ease;\" style-hover=\"background:oklch(0.19 0.032 264);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.48 0.02 262);\">07<\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;\">Auto-refresh <span style=\"font-size:9px;letter-spacing:0.07em;text-transform:uppercase;font-weight:700;color:oklch(0.7 0.1 266);background:oklch(0.7 0.1 266 / 0.13);border:1px solid oklch(0.7 0.1 266 / 0.4);border-radius:999px;padding:2px 8px;\">Automated<\u002Fspan><\u002Fspan>\n        <span style=\"font-size:13px;color:oklch(0.63 0.015 260);line-height:1.6;\">Connect once with an IBKR Flex token — IBKR posts each day's statement overnight and Blotter pulls it automatically on open, through an open-source, no-log relay. Optional live intraday shows closed positions ~10 minutes after the fill — it's in the demo.<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"how\" data-screen-label=\"How it works\" style=\"max-width:1080px;margin:0 auto;padding:72px 28px 0;\">\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.14em;color:oklch(0.55 0.02 262);font-weight:600;\">SET UP IN THREE STEPS<\u002Fspan>\n      <div style=\"flex:1;height:1px;background:oklch(0.25 0.03 264);\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:24px;display:flex;align-items:stretch;gap:0;flex-wrap:wrap;\">\n      <div style=\"flex:1;min-width:250px;background:oklch(0.185 0.031 264);border:1px solid oklch(0.27 0.032 264);border-radius:13px;padding:18px 20px;\">\n        <div style=\"display:flex;align-items:center;gap:11px;\">\n          <span style=\"width:34px;height:34px;border-radius:10px;background:oklch(0.72 0.08 266 / 0.13);border:1px solid oklch(0.72 0.08 266 / 0.4);display:flex;align-items:center;justify-content:center;color:oklch(0.72 0.08 266);flex:none;\">\n            <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71\"><\u002Fpath><path d=\"M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <div style=\"display:flex;flex-direction:column;gap:1px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.12em;color:oklch(0.55 0.02 262);font-weight:600;\">STEP 1<\u002Fspan>\n            <span style=\"font-size:14.5px;font-weight:700;\">Connect<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;color:oklch(0.63 0.015 260);line-height:1.65;margin-top:11px;\">One Flex Query + token, pasted once — or keep dropping CSVs. The in-app guide covers both.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;padding:0 4px;color:oklch(0.45 0.04 266);flex:none;\">\n        <svg width=\"30\" height=\"14\" sc-camel-view-box=\"0 0 30 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M1 7h24\"><\u002Fpath><path d=\"M20 2l6 5-6 5\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div (0.29 0.032 264);border-radius:7px;padding:4px 10px;\">no-log relay<\u002Fspan>\n        <span style=\"color:oklch(0.45 0.04 266);\">→<\u002Fspan>\n        <span style=\"color:oklch(0.75 0.012 258);background:oklch(0.21 0.032 264);border:1px solid oklch(0.29 0.032 264);border-radius:7px;padding:4px 10px;\">your browser<\u002Fspan>\n        <span style=\"color:oklch(0.45 0.04 266);\">→<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;color:oklch(0.72 0.15 160);background:oklch(0.72 0.15 160 / 0.1);border:1px solid oklch(0.72 0.15 160 / 0.35);border-radius:7px;padding:4px 10px;\">\n          <svg width=\"10\" height=\"10\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n          stays on your device\n        <\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size:11px;color:oklch(0.55 0.02 262);margin-left:auto;\">Nothing is stored server-side.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"faq\" data-screen-label=\"FAQ\" style=\"max-width:1080px;margin:0 auto;padding:72px 28px 0;\">\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.14em;color:oklch(0.55 0.02 262);font-weight:600;\">FAQ<\u002Fspan>\n      <div style=\"flex:1;height:1px;background:oklch(0.25 0.03 264);\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:10px;max-width:760px;\">\n      <details style=\"padding:16px 0;\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:14.5px;font-weight:700;transition:color .15s ease;\" style-hover=\"color:oklch(0.85 0.05 266);\">Is Blotter really free?<span style=\"color:oklch(0.55 0.02 262);font-size:18px;font-weight:400;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:10px 0 2px;font-size:13px;color:oklch(0.66 0.015 260);line-height:1.65;\">Yes — Blotter is free while in beta. No account, no card, no trial timer.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"padding:16px 0;border-top:1px solid oklch(0.24 0.03 264);\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:14.5px;font-weight:700;transition:color .15s ease;\" style-hover=\"color:oklch(0.85 0.05 266);\">Where does my trading data go?<span style=\"color:oklch(0.55 0.02 262);font-size:18px;font-weight:400;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:10px 0 2px;font-size:13px;color:oklch(0.66 0.015 260);line-height:1.65;\">Nowhere. Parsing happens in your browser and results are stored on your device. There’s no server to send them to — we never see a single trade.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"padding:16px 0;border-top:1px solid oklch(0.24 0.03 264);\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:14.5px;font-weight:700;transition:color .15s ease;\" style-hover=\"color:oklch(0.85 0.05 266);\">Which brokers are supported?<span style=\"color:oklch(0.55 0.02 262);font-size:18px;font-weight:400;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:10px 0 2px;font-size:13px;color:oklch(0.66 0.015 260);line-height:1.65;\">Interactive Brokers today — both the one-click Transaction History CSV and Flex Query exports. More brokers will follow based on what early users ask for.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"padding:16px 0;border-top:1px solid oklch(0.24 0.03 264);\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:14.5px;font-weight:700;transition:color .15s ease;\" style-hover=\"color:oklch(0.85 0.05 266);\">How does auto-refresh work — do you ever see my data?<span style=\"color:oklch(0.55 0.02 262);font-size:18px;font-weight:400;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:10px 0 2px;font-size:13px;color:oklch(0.66 0.015 260);line-height:1.65;\">Auto-refresh uses IBKR’s Flex Web Service: you paste a query ID and a read-only reporting token, stored on your device. IBKR blocks direct browser connections, so the request passes through an open-source, stateless relay that keeps nothing — no logs, no storage, no accounts. Parsing and storage still happen in your browser. IBKR posts each day’s statement overnight; Blotter pulls it automatically when you open it, so yesterday’s session is on your calendar each morning.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"padding:16px 0;border-top:1px solid oklch(0.24 0.03 264);\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:14.5px;font-weight:700;transition:color .15s ease;\" style-hover=\"color:oklch(0.85 0.05 266);\">What instruments does it handle?<span style=\"color:oklch(0.55 0.02 262);font-size:18px;font-weight:400;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:10px 0 2px;font-size:13px;color:oklch(0.66 0.015 260);line-height:1.65;\">Futures, options and stocks. Multi-currency accounts are converted to your base currency, and totals are checked against your statement’s cash balances.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"padding:16px 0;border-top:1px solid oklch(0.24 0.03 264);\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:14.5px;font-weight:700;transition:color .15s ease;\" style-hover=\"color:oklch(0.85 0.05 266);\">Can I move to a new computer or browser?<span style=\"color:oklch(0.55 0.02 262);font-size:18px;font-weight:400;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:10px 0 2px;font-size:13px;color:oklch(0.66 0.015 260);line-height:1.65;\">Yes — Export backup produces one file with your journal, tags, setups and imported data. Restore it on the new machine and you’re exactly where you left off.<\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Final CTA\" style=\"max-width:1080px;margin:0 auto;padding:84px 28px 76px;\">\n    <div style=\"border-top:1px solid oklch(0.25 0.03 264);padding-top:56px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n      <div style=\"position:relative;display:flex;align-items:center;justify-content:center;\">\n        <div style=\"position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(closest-side, oklch(0.42 0.11 266 / 0.18), transparent 72%);pointer-events:none;\"><\u002Fdiv>\n        <div style=\"position:relative;width:96px;height:96px;border-radius:26px;background:oklch(0.24 0.045 266);border:1px solid oklch(0.4 0.08 266);display:flex;align-items:center;justify-content:center;animation:logoBreathe 4.5s ease-in-out infinite;\">\n          <svg width=\"52\" height=\"52\" sc-camel-view-box=\"0 0 24 24\"><path d=\"M12 2.8 L20.7 11.5 L3.3 11.5 Z\" fill=\"oklch(0.78 0.16 158)\"><\u002Fpath><path d=\"M3.3 12.9 L20.7 12.9 L12 21.6 Z\" fill=\"oklch(0.68 0.17 26)\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <h2 style=\"margin:28px 0 0;font-size:26px;font-weight:700;letter-spacing:-0.02em;\">See your own year of trading.<\u002Fh2>\n      <div style=\"margin-top:9px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.55 0.02 262);\">free · no signup · about 30 seconds<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px;margin-top:26px;\">\n        <a href=\"app.html\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;padding:13px 24px;background:oklch(0.42 0.11 266);border:1px solid oklch(0.55 0.12 266);border-radius:10px;color:oklch(0.98 0.01 266);font-size:14.5px;font-weight:700;\" style-hover=\"background:oklch(0.47 0.12 266);\">Open ize:10.5px;color:oklch(0.45 0.015 262);line-height:1.6;\">Blotter is an independent project and is not affiliated with Interactive Brokers. Nothing on this site is investment advice.<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
