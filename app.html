  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

weight:600;\">Select All<\u002Fspan> columns:\n              <div style=\"display:flex;align-items:stretch;gap:8px;margin-top:7px;\">\n                <div style=\"flex:1;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text58);background:var(--inset2);border:1px solid var(--border-sub);border-radius:7px;padding:7px 9px;line-height:1.65;\">Trades (Executions) · Cash Transactions (Detail) · Cash Report · Account Information · MTM Performance Summary · GST/HST/PST Details<\u002Fdiv>\n                <span sc-camel-on-click=\"{{ fx.copySections }}\" style=\"flex:none;display:inline-flex;align-items:center;gap:5px;padding:0 10px;border:1px solid var(--border4);border-radius:7px;color:var(--text70);font-size:10.5px;font-weight:600;cursor:pointer;\" style-hover=\"background:var(--hover);\"><svg width=\"10\" height=\"10\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>Copy<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:var(--seg-bg);color:var(--seg-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">3<\u002Fspan><span style=\"font-size:12px;color:var(--text62);line-height:1.55;\">Delivery <span style=\"color:var(--seg-text);font-weight:600;\">CSV<\u002Fspan> · column headers <span style=\"color:var(--seg-text);font-weight:600;\">Yes<\u002Fspan> · section code &amp; line descriptor <span style=\"color:var(--seg-text);font-weight:600;\">Yes<\u002Fspan> · Breakout by Day <span style=\"color:var(--seg-text);font-weight:600;\">Yes<\u002Fspan>.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:14px;background:color-mix(in oklch, var(--chevron-neon) 8%, transparent);border:1px solid color-mix(in oklch, var(--chevron-neon) 32%, transparent);border-radius:9px;padding:10px 13px;\">\n          <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--chevron-neon)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:11px;color:var(--text70);line-height:1.6;\">Mis-built queries are the top cause of broken syncs on other journals. Blotter <span style=\"color:var(--text90);font-weight:600;\">verifies all six sections<\u002Fspan> at the final step — nothing fails silently.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-top:1px solid var(--border-sub);background:var(--panel-sunk);\">\n        <span sc-camel-on-click=\"{{ fx.toStep3 }}\" style=\"font-size:12px;font-weight:600;color:var(--text70);cursor:pointer;border-bottom:1px solid var(--border4);\">I already have both →<\u002Fspan>\n        <span sc-camel-on-click=\"{{ fx.toStep2 }}\" style=\"{{ fx.primaryStyle }}\" style-hover=\"filter:brightness(1.1);\">Query created →<\u002Fspan>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ fx.isStep2 }}\">\n      <div style=\"padding:20px 22px 22px;\">\n        <div style=\"font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.01em;\">Generate your Web Service token<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:var(--text62);line-height:1.55;margin-top:6px;\">The token lets Blotter pull the same report you'd export by hand — no password, read-only reporting access.<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:16px;\">\n          <div style=\"display:flex;gap:10px;align-items:flex-start;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:var(--seg-bg);color:var(--seg-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">1<\u002Fspan><span style=\"font-size:12px;color:var(--text62);line-height:1.55;\">Back on the main <span style=\"color:var(--seg-text);font-weight:600;\">Flex Queries<\u002Fspan> page (not inside the query editor), find the separate <span style=\"color:var(--seg-text);font-weight:600;\">Flex Web Service Configuration<\u002Fspan> section.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:var(--seg-bg);color:var(--seg-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">2<\u002Fspan><span style=\"font-size:12px;color:var(--text62);line-height:1.55;\">Click its gear icon, check <span style=\"color:var(--seg-text);font-weight:600;\">Flex Web Service Status<\u002Fspan>, and save.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:var(--seg-bg);color:var(--seg-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">3<\u002Fspan><span style=\"font-size:12px;color:var(--text62);line-height:1.55;\">A token appears — set <span style=\"color:var(--seg-text);font-weight:600;\">Should Expire After<\u002Fspan> to <span style=\"color:var(--seg-text);font-weight:600;\">1 year<\u002Fspan> (IBKR defaults to 6 hours) and copy it.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text58);margin-top:14px;background:var(--inset2);border:1px solid var(--border-sub);border-radius:7px;padding:8px 11px;line-height:1.6;\">Reports → Flex Queries → Flex Web Service Configuration (gear icon)<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:7px;margin-top:11px;\">\n          <svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--chevron-neon)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:11px;color:var(--text55);\">This is a different panel than the query builder — easy to miss on first pass.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-top:1px solid var(--border-sub);background:var(--panel-sunk);\">\n        <span sc-camel-on-click=\"{{ fx.back }}\" style=\"{{ fx.ghostStyle }}\" style-hover=\"background:var(--hover);\">← Back<\u002Fspan>\n        <span sc-camel-on-click=\"{{ fx.toStep3 }}\" style=\"{{ fx.primaryStyle }}\" style-hover=\"filter:brightness(1.1);\">I have my token →<\u002Fspan>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ fx.isStep3 }}\">\n      <div style=\"padding:20px 22px 22px;\">\n        <div style=\"font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.01em;\">Paste &amp; verify<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:150px 1fr;gap:12px;margin-top:14px;\">\n          <div style=\"display:flex;flex-direction:column;gap:6px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.1em;font-weight:600;color:var(--text55);\">QUERY ID<\u002Fspan>\n            <input value=\"{{ fx.queryId }}\" sc-camel-on-change=\"{{ fx.onQueryId }}\" placeholder=\"e.g. 912648\" style=\"{{ fx.inputStyle }}\">\n            <span style=\"font-size:10.5px;color:var(--text48);line-height:1.5;\">Back on the Flex Queries list, click the info (ⓘ) icon next to your query's name.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.1em;font-weight:600;color:var(--text55);\">TOKEN<\u002Fspan>\n            <input value=\"{{ fx.token }}\" sc-camel-on-change=\"{{ fx.onToken }}\" placeholder=\"paste from Flex Web Service\" style=\"{{ fx.tokenInputStyle }}\">\n            <span style=\"font-size:10.5px;color:var(--text48);line-height:1.5;\">Stored on this device only — never in an account.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ fx.hasErr }}\">\n        <div style=\"margin-top:12px;font-size:11.5px;color:var(--red);font-weight:600;line-height:1.5;\">{{ fx.err }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ fx.hasChecks }}\">\n        <div style=\"margin-top:14px;background:var(--inset2);border:1px solid var(--border-sub);border-radius:10px;padding:4px 15px;\">\n          <sc-for list=\"{{ fx.checks }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div>\n              <div style=\"{{ c.rowStyle }}\">\n                <span style=\"{{ c.glyphStyle }}\">{{ c.glyph }}<\u002Fspan>\n                <span style=\"{{ c.labelStyle }}\">{{ c.label }}<\u002Fspan>\n                <span style=\"{{ c.detailStyle }}\">{{ c.detail }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ c.hasMissing }}\">\n              <div style=\"margin:0 0 10px 24px;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--red);background:color-mix(in oklch, var(--red) 9%, transparent);border:1px solid color-mix(in oklch, var(--red) 35%, transparent);border-radius:7px;padding:7px 10px;line-height:1.65;\">MISSING: {{ c.missing }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ fx.hasFix }}\">\n        <div style=\"display:flex;gap:10px;align-items:flex-start;margin-top:12px;\">\n          <span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:var(--seg-bg);color:var(--seg-text);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">→<\u002Fspan>\n          <span style=\"font-size:12px;color:var(--text62);line-height:1.6;\">{{ fx.fixText }}<\u002Fspan>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"margin-top:14px;background:var(--inset2);border:1px solid var(--border-sub);border-radius:10px;padding:13px 14px;\">\n          <div style=\"display:grid;grid-template-columns:1fr 20px 1.25fr 20px 1fr;align-items:stretch;\">\n            <div style=\"border:1px solid var(--border2);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:2px;justify-content:center;\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:0.1em;color:var(--text55);font-weight:600;\">IBKR<\u002Fspan>\n              <span style=\"font-size:10.5px;font-weight:700;color:var(--text82);\">Flex Web Service<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:center;\"><svg width=\"14\" height=\"10\" sc-camel-view-box=\"0 0 28 12\" fill=\"none\" stroke=\"var(--text48)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M1 6h24\"><\u002Fpath><path d=\"M21 2l4 4-4 4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"border:1px solid var(--seg-border);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:2px;justify-content:center;\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:0.1em;color:var(--seg-text);font-weight:600;\">RELAY · OPEN SOURCE<\u002Fspan>\n              <span style=\"font-size:10.5px;font-weight:700;color:var(--text82);\">Forwards · keeps nothing<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:center;\"><svg width=\"14\" height=\"10\" sc-camel-view-box=\"0 0 28 12\" fill=\"none\" stroke=\"var(--text48)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M1 6h24\"><\u002Fpath><path d=\"M21 2l4 4-4 4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"border:1px solid var(--border2);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:2px;justify-content:center;\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:0.1em;color:var(--text55);font-weight:600;\">YOUR BROWSER<\u002Fspan>\n              <span style=\"font-size:10.5px;font-weight:700;color:var(--text82);\">Parsed &amp; stored here<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;align-items:flex-start;margin-top:10px;padding-top:9px;border-top:1px dashed var(--border-sub);\">\n            <svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--note)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px;\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:10.5px;color:var(--text62);line-height:1.55;\"><span style=\"color:var(--text82);font-weight:700;\">Why a relay?<\u002Fspan> IBKR blocks direct browser calls, so the fetch passes through a stateless relay — no logs, no storage, no accounts. Your token stays on this device.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-top:1px solid var(--border-sub);background:var(--panel-sunk);\">\ \"sl\" hint-placeholder-count=\"0\">\n                <div style=\"display:flex;align-items:center;gap:10px;\">\n                  <span style=\"{{ sl.dotStyle }}\"><\u002Fspan>\n                  <span style=\"{{ sl.textStyle }}\">{{ sl.text }}<\u002Fspan>\n                  <span style=\"{{ sl.detailStyle }}\">{{ sl.detail }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:0.12em;color:var(--text42);font-weight:600;margin-top:12px;\">RECENT EVENTS<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ ds.hasLog }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:8px;max-height:190px;overflow-y:auto;\">\n              <sc-for list=\"{{ ds.logRows }}\" as=\"ev\" hint-placeholder-count=\"0\">\n                <div style=\"{{ ev.rowStyle }}\">\n                  <span style=\"{{ ev.dotStyle }}\"><\u002Fspan>\n                  <span style=\"flex:1;font-size:11.5px;color:var(--text70);line-height:1.45;\">{{ ev.msg }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text42);white-space:nowrap;\">{{ ev.time }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:flex-end;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-sub);\">\n              <span sc-camel-on-click=\"{{ ds.clearLog }}\" style=\"font-size:10.5px;color:var(--text48);cursor:pointer;font-weight:600;\" style-hover=\"color:var(--text70);\">Clear history<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ ds.noLog }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:11.5px;color:var(--text48);margin-top:10px;line-height:1.5;\">Sync events appear here — new trades pulled from IBKR, imports, and connection changes.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ ds.relayVisible }}\">\n        <div style=\"background:var(--inset2);border:1px solid var(--border2);border-radius:14px;padding:16px 18px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.14em;color:var(--text55);font-weight:600;\">RELAY<\u002Fspan>\n            <div style=\"flex:1;height:1px;background:var(--border-sub);\"><\u002Fdiv>\n            <span style=\"{{ ds.relayBadgeStyle }}\">{{ ds.relayBadge }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text62);line-height:1.55;margin-top:10px;\">{{ ds.relayDesc }}<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;margin-top:10px;align-items:stretch;\">\n            <input value=\"{{ ds.relayVal }}\" sc-camel-on-change=\"{{ ds.onRelay }}\" placeholder=\"https://blotter-flex-relay.you.workers.dev\" style=\"{{ ds.relayInputStyle }}\">\n            <span sc-camel-on-click=\"{{ ds.saveRelay }}\" style=\"{{ ds.primaryStyle }}\" style-hover=\"filter:brightness(1.1);\">Save<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"background:var(--inset2);border:1px solid var(--border2);border-radius:14px;padding:16px 18px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.14em;color:var(--text55);font-weight:600;\">YOUR DATA<\u002Fspan>\n            <div style=\"flex:1;height:1px;background:var(--border-sub);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ ds.hasBackup }}\">\n          <div style=\"display:flex;flex-direction:column;margin-top:4px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:10px 0;\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.1em;color:var(--text55);font-weight:600;\">LIVE BACKUP<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text82);\">{{ ds.bkName }} · <span style=\"color:var(--text58);\">{{ ds.bkWritten }}<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ ds.bkNeedsPerm }}\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:14px;padding:10px 0;border-top:1px solid var(--border-sub);\">\n              <span style=\"font-size:12px;color:var(--text70);\">This browser needs permission to keep writing the file.<\u002Fspan>\n              <span sc-camel-on-click=\"{{ ds.bkReconnect }}\" style=\"{{ ds.primaryStyle }}\" style-hover=\"filter:brightness(1.1);\">Reconnect<\u002Fspan>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ ds.bkLive }}\">\n            <div style=\"display:flex;align-items:center;gap:7px;padding:10px 0;border-top:1px solid var(--border-sub);\">\n              <svg width=\"11\" height=\"11\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--green)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-size:12px;color:var(--text70);\">Written after every change — journal, tags, setups, trades &amp; IBKR connection.<\u002Fspan>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ ds.bkError }}\">\n            <div style=\"font-size:11.5px;color:var(--red);font-weight:600;padding:10px 0;border-top:1px solid var(--border-sub);\">Couldn't write the last backup — is the file still there?<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:4px;padding-top:13px;border-top:1px solid var(--border-sub);\">\n            <span sc-camel-on-click=\"{{ ds.backupNow }}\" style=\"{{ ds.ghostStyle }}\" style-hover=\"background:var(--hover);\">Back up now<\u002Fspan>\n            <span sc-camel-on-click=\"{{ ds.chooseBk }}\" style=\"font-size:11.5px;font-weight:600;color:var(--text70);cursor:pointer;border-bottom:1px solid var(--border4);\">Change file…<\u002Fspan>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ ds.noBackup }}\">\n          <div style=\"font-size:12px;color:var(--text62);line-height:1.6;margin-top:10px;\">Your journal and connection live in this browser. Keep one file current in an iCloud / Dropbox / OneDrive folder and it follows you to every machine.<\u002Fdiv>\n          <sc-if value=\"{{ ds.fsNo }}\">\n          <div style=\"font-size:10.5px;color:var(--text48);line-height:1.6;margin-top:8px;\">Live backup needs Chrome or Edge — here you'll get a one-time download instead.<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:13px;\">\n            <span sc-camel-on-click=\"{{ ds.chooseBk }}\" style=\"{{ ds.primaryStyle }}\" style-hover=\"filter:brightness(1.1);\">Set up live backup<\u002Fspan>\n            <label style=\"font-size:11.5px;font-weight:600;color:var(--text70);cursor:pointer;border-bottom:1px solid var(--border4);\">Restore from a file…<input type=\"file\" accept=\".json,application/json\" sc-camel-on-change=\"{{ ds.onRestore }}\" style=\"display:none\"><\u002Flabel>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ gToast.show }}\">\n  <div style=\"position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:530;background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:11px 18px;box-shadow:0 16px 44px rgba(0,0,0,0.42);display:flex;align-items:center;gap:9px;\">\n    <span style=\"width:7px;height:7px;border-radius:50%;background:var(--note);flex:none;\"><\u002Fspan>\n    <span style=\"font-size:12.5px;color:var(--text);font-weight:600;white-space:nowrap;\">{{ gToast.msg }}<\u002Fspan>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ welcome }}\">\n    <div style=\"{{ welcomeWrapStyle }}\">\n      <div style=\"position:relative;display:flex;align-items:center;justify-content:center;\">\n        <div style=\"position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(closest-side, color-mix(in oklch, var(--layout-bg) 20%, transparent), transparent 72%);pointer-events:none;\"><\u002Fdiv>\n        <div style=\"position:relative;width:70px;height:70px;border-radius:18px;background:var(--logo-bg);display:flex;align-items:center;justify-content:center;border:1px solid var(--logo-border);animation:logoBreathe 4.5s ease-in-out infinite;\">\n          <svg width=\"36\" height=\"36\" sc-camel-view-box=\"0 0 24 24\"><path d=\"M12 2.8 L20.7 11.5 L3.3 11.5 Z\" fill=\"var(--green)\" stroke=\"var(--green)\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M3.3 12.9 L20.7 12.9 L12 21.6 Z\" fill=\"var(--red)\" stroke=\"var(--red)\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:34px;font-weight:700;letter-spacing:-0.02em;line-height:1.15;max-width:600px;margin-top:24px;\">Every trading day, on the record.<\u002Fdiv>\n      <div style=\"font-size:14px;color:var(--text60);margin-top:12px;max-width:560px;line-height:1.55;\">Connect <span style=\"color:var(--text80);font-weight:600;\">IBKR<\u002Fspan> once for auto-refresh — or drop in a <span style=\"color:var(--text80);font-weight:600;\">Transaction History<\u002Fspan> / <span style=\"color:var(--text80);font-weight:600;\">Flex Query<\u002Fspan> CSV. Everything is parsed and stored in your browser; nothing is uploaded.<\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:7px 14px;background:var(--seg-bg);border:1px solid var(--seg-border);border-radius:999px;\">\n        <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--seg-text)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:12px;font-weight:600;color:var(--seg-text);\">100% private — your data is parsed in your browser and never leaves your device.<\u002Fspan>\n      <\u002Fdiv>\n      <label style=\"{{ welcomeZoneStyle }}\" style-hover=\"border-color:var(--focus);\">\n        <svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--seg-text)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:8px;\"><path d=\"M12 15V3M8 7l4-4 4 4\"><\u002Fpath><path d=\"M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-size:15.5px;font-weight:700;\">{{ welcomeZoneLabel }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--text55);\">or click to browse<\u002Fdiv>\n        <input type=\"file\" accept=\".csv,text/csv\" sc-camel-on-change=\"{{ onFile }}\" style=\"display:none\">\n      <\u002Flabel>\n      <div style=\"margin-top:20px;width:min(1020px,100%);text-align:left;\">\n        <div style=\"display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:15px;\">\n          <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--note)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v6h-6\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:14px;font-weight:700;color:var(--note);letter-spacing:0.005em;\">How do I connect my IBKR account?<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(320px,100%),1fr));gap:12px;\">\n          <div style=\"background:var(--panel);border:1px solid var(--border2);border-top:2px solid color-mix(in oklch, var(--rec) 60%, transparent);border-radius:12px;padding:15px 17px;transition:transform .2s ease, box-shadow .2s ease;\" style-hover=\"transform:translateY(-2px);box-shadow:0 10px 28px rgba(10,15,35,0.25);\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;\">\n              <span style=\"font-size:12.5px;font-weight:700;color:var(--text);\">Create your Flex Query<\u002Fspan>\n              <span style=\"font-size:9px;letter-spacing:0.07em;text-transform:uppercase;font-weight:700;color:var(--rec);background:color-mix(in oklch, var(--rec) 14%, transparent);border:1px solid color-mix(in oklch, var(--rec) 45%, transparent);border-radius:999px;padding:2px 8px;\">Step 1<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:12px;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:color-mix(in oklch, var(--rec) 15%, transparent);color:var(--rec);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">1<\u002Fspan><span style=\"font-size:11.5px;color:var(--text62);line-height:1.5;\"><span style=\"color:var(--rec);font-weight:600;\">Performance &amp; Reports → Flex Queries<\u002Fspan> → create a new <span style=\"color:var(--rec);font-weight:600;\">Activity Flex Query<\u002Fspan>.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:9px;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:color-mix(in oklch, var(--rec) 15%, transparent);color:var(--rec);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">2<\u002Fspan><span style=\"font-size:11.5px;color:var(--text62);line-height:1.5;\">Tick these sections, each with <span style=\"color:var(--rec);font-weight:600;\">Select All<\u002Fspan> columns:<span style=\"display:block;position:relative;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text62);margin-top:6px;background:var(--inset2);border:1px solid var(--border-sub);border-radius:7px;padding:8px 34px 8px 10px;\">\n              <span style=\"display:flex;align-items:center;gap:7px;padding:2px 0;\"><span style=\"width:3px;height:3px;border-radius:50%;background:var(--rec);flex:none;\"><\u002Fspan>Trades (Executions)<\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:7px;padding:2px 0;\"><span style=\"width:3px;height:3px;border-radius:50%;background:var(--rec);flex:none;\"><\u002Fspan>Cash Transactions (Detail)<\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:7px;padding:2px 0;\"><span style=\"width:3px;height:3px;border-radius:50%;background:var(--rec);flex:none;\"><\u002Fspan>Cash Report<\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:7px;padding:2px 0;\"><span style=\"width:3px;height:3px;border-radius:50%;background:var(--rec);flex:none;\"><\u002Fspan>Account Information<\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:7px;padding:2px 0;\"><span style=\"width:3px;height:3px;border-radius:50%;background:var(--rec);flex:none;\"><\u002Fspan>Mark-to-Market Performance Summary in Base<\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:7px;padding:2px 0;\"><span style=\"width:3px;height:3px;border-radius:50%;background:var(--rec);flex:none;\"><\u002Fspan>GST/HST/PST Details<\u002Fspan>\n              <span sc-camel-on-click=\"{{ fx.copySections }}\" title=\"Copy list\" style=\"position:absolute;top:5px;right:5px;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1px solid var(--border-sub);border-radius:6px;color:var(--text55);cursor:pointer;background:var(--panel);transition:color .15s ease, border-color .15s ease;\" style-hover=\"color:var(--text90);border-color:var(--border4);\"><svg width=\"11\" height=\"11\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:9px;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:color-mix(in oklch, var(--rec) 15%, transparent);color:var(--rec);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">3<\u002Fspan><span style=\"font-size:11.5px;color:var(--text62);line-height:1.5;\">Delivery: CSV · column headers <span style=\"color:var(--rec);font-weight:600;\">Yes<\u002Fspan> · section code and line descriptor <span style=\"color:var(--rec);font-weight:600;\">Yes<\u002Fspan> · Breakout by Day <span style=\"color:var(--rec);font-weight:600;\">Yes<\u002Fspan>.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:9px;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:color-mix(in oklch, var(--rec) 15%, transparent);color:var(--rec);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">4<\u002Fspan><span style=\"font-size:11.5px;color:var(--text62);line-height:1.5;\">Save the query — Step 2 automates the rest.<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:10.5px;color:var(--text48);margin-top:12px;padding-top:10px;border-top:1px solid var(--border-sub);\">Adds exact timestamps, entry/exit prices, and hold times.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:var(--panel);border:1px solid var(--border2);border-top:2px solid var(--note);border-radius:12px;padding:15px 17px;display:flex;flex-direction:column;transition:transform .2s ease, box-shadow .2s ease;\" style-hover=\"transform:translateY(-2px);box-shadow:0 10px 28px rgba(10,15,35,0.25);\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;\">\n              <span style=\"font-size:12.5px;font-weight:700;color:var(--text);\">Turn on auto-refresh<\u002Fspan>\n              <span style=\"font-size:9px;letter-spacing:0.07em;text-transform:uppercase;font-weight:700;color:var(--note);background:color-mix(in oklch, var(--note) 14%, transparent);border:1px solid color-mix(in oklch, var(--note) 42%, transparent);border-radius:999px;padding:2px 8px;\">Step 2<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px;color:var(--text62);line-height:1.55;margin-top:10px;\">Set up once — IBKR posts each day's statement overnight, and Blotter pulls it automatically every time you open. No more exporting CSVs.<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:12px;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:var(--seg-bg);color:var(--seg-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">1<\u002Fspan><span style=\"font-size:11.5px;color:var(--text62);line-height:1.5;\">On the Flex Queries page, turn on <span style=\"color:var(--seg-text);font-weight:600;\">Flex Web Service<\u002Fspan> (separate section, gear icon) and copy the token.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:9px;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:var(--seg-bg);color:var(--seg-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">2<\u002Fspan><span style=\"font-size:11.5px;color:var(--text62);line-height:1.5;\">Copy your <span style=\"color:var(--seg-text);font-weight:600;\">Query ID<\u002Fspan> — the number in the info ⓘ popover next to the query's name.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:9px;\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:var(--seg-bg);color:var(--seg-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;\">3<\u002Fspan><span style=\"font-size:11.5px;color:var(--text62);line-height:1.5;\">Paste both into Blotter — done.<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:auto;\">\n              <div sc-camel-on-click=\"{{ fx.openModal }}\" style=\"margin-top:14px;display:inline-flex;align-items:center;gap:7px;padding:9px 16px;background:var(--layout-bg);border:1px solid var(--layout-border);border-radius:9px;color:var(--layout-text);font-size:12px;font-weight:700;cursor:pointer;transition:filter .15s ease;\" style-hover=\"filter:brightness(1.12);\">\n                <svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v6h-6\"><\u002Fpath><\u002Fsvg>\n                {{ fx.connectLabel }}\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:10.5px;color:var(--text48);margin-top:12px;padding-top:10px;border-top:1px solid var(--border-sub);\">\n                <span style=\"line-height:1.5;\">{{ fx.relayFoot }}<\u002Fspan>\n                <span sc-camel-on-click=\"{{ ds.openIt }}\" title=\"Relay URL, refresh settings, backups\" style=\"flex:none;color:var(--seg-text);font-weight:600;cursor:pointer;white-space:no
